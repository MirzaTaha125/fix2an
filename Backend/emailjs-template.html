<!--
  FIXA2AN - EmailJS Template
  =========================
  1. Go to emailjs.com → Email Templates → Create New
  2. In "To Email" field put: {{to_email}}
  3. In "Subject" field put: {{subject}}
  4. In Content (HTML) paste the div below
  5. Save template and copy Template ID to Admin Settings
-->

<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #1C3F94; font-size: 24px; margin-bottom: 20px;">{{heading}}</h1>
  <div style="color: #333; line-height: 1.6;">{{{body}}}</div>
  <p style="color: #666; font-size: 12px; margin-top: 24px;">Med vänliga hälsningar, Fixa2an</p>
</div>
